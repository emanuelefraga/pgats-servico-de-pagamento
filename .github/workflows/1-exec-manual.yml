# CI de Nível 01 - Disparo Manual através de clique
# nome da pipeline
name: 'Execução Manual'

# define as permissões mínimas que o workflow terá
permissions:
  contents: read

# gatilhos / triggers - regras de disparo
on:
  workflow_dispatch:

# evita múltiplas execuções simultâneas para a mesma branch
concurrency:
  group: ci-manual-${{ github.ref }}

# tarefas dentro da pipeline = jobs
jobs:

  # nome do job
  testes:

    # máquina onde o job vai rodar
    runs-on: ubuntu-latest

    # tempo máximo de execução antes de cancelar automaticamente
    timeout-minutes: 15

    # estratégia para testar em múltiplas versões do Node.js
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    # passos do job
    steps:

      # clone do projeto
      - uses: actions/checkout@v4

      # instalação do node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      # instalação das dependências
      - name: Instalando dependências
        run: npm ci

      # executar os testes
      - name: Executando testes
        run: npm test
        
      # salvar relatório
      - name: Salvando relatório de testes
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: Relatorio-Testes-N1-Node-${{ matrix.node-version }}
          path: ./test-results