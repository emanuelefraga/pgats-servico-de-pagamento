# CI de Nível 03 - Execução por Push
# nome da pipeline
name: 'Execução por Push'

# define as permissões mínimas que o workflow terá
permissions:
  contents: read

# gatilhos / triggers - regras de disparo
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# evita múltiplas execuções simultâneas para a mesma branch
concurrency:
  group: ci-push-${{ github.ref }}

# tarefas dentro da pipeline = jobs
jobs:

  # nome do job
  testes:

    # máquina onde o job vai rodar
    runs-on: ubuntu-latest

    # tempo máximo de execução antes de cancelar automaticamente
    timeout-minutes: 15

    # estratégia para testar em múltiplas versões do Node.js
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
        
    # passos do job
    steps:

      # clone do projeto
      - name: Checkout do código
        uses: actions/checkout@v4

      # instalação do node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      # instalação das dependências
      - name: Instalar dependências
        run: npm ci

      # executar os testes
      - name: Executar testes
        run: |
          mkdir -p test-results
          npm run test:report

      # salvar relatório
      - name: Salvando relatório de testes
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: Relatorio-Testes-N3-Node-${{ matrix.node-version }}
          path: ./test-results