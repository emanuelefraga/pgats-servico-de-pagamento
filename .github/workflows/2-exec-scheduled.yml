# CI de Nível 02 - Execução Agendada
# nome da pipeline
name: 'N2 - Execução Agendada'

# define as permissões mínimas que o workflow terá
permissions:
  contents: read

# gatilhos / triggers - regras de disparo
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:

    # cronograma de execução
    # 1 - minuto, 2 - hora, 3 - dia do mês, 4 - mês, 5 - dia da semana
    # roda hoje às 19h58 de Brasília (22h58 UTC) para evidência
    - cron: '58 22 * * *'

    # roda toda sexta-feira à meia noite UTC
    - cron: '0 0 * * 5'

# evita múltiplas execuções simultâneas para a mesma branch
concurrency:
  group: ci-scheduled-${{ github.ref }}

# tarefas dentro da pipeline = jobs
jobs:

  # nome do job
  testes:

    # máquina onde o job vai rodar
    runs-on: ubuntu-latest

    # tempo máximo de execução antes de cancelar automaticamente
    timeout-minutes: 15

    # estratégia para testar em múltiplas versões do Node.js
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    # passos do job
    steps:

      # clone do projeto
      - uses: actions/checkout@v4

      # instalação do node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      # instalação das dependências
      - name: Instalar dependências
        run: npm ci

      # criar pasta e executar testes gerando relatório
      - name: Executando testes
        run: |
          mkdir -p test-results
          npm run test:report
          
      # salvar relatório
      - name: Salvando relatório de testes
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: Relatorio-Testes-N2-Node-${{ matrix.node-version }}
          path: ./test-results